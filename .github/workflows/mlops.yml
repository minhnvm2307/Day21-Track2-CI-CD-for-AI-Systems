name: MLOps Pipeline

on:
  push:
    branches: [master, main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials ra file tam va set bien moi truong xac thuc.
        # GCP:   echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
        #        echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
        # AWS:   echo "AWS_ACCESS_KEY_ID=..." >> $GITHUB_ENV  (lay tu secrets)
        #        echo "AWS_SECRET_ACCESS_KEY=..." >> $GITHUB_ENV
        # Azure: echo "AZURE_STORAGE_CONNECTION_STRING=..." >> $GITHUB_ENV
        env:
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          echo "AWS_ACCESS_KEY_ID=$(echo "$CLOUD_CREDENTIALS" | jq -r '.aws_access_key_id')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo "$CLOUD_CREDENTIALS" | jq -r '.aws_secret_access_key')" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        #         Chi pull train_phase1.csv va eval.csv (khong can train_phase2.csv).
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        #         Set ket qua thanh output "accuracy" de job deploy co the doc.
        #
        # Goi y:
        #   ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
        #   echo "accuracy=$ACC" >> $GITHUB_OUTPUT
        run: |
          acc=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$acc" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # TODO 5: Su dung cloud SDK de upload models/model.pkl len
        #         <bucket>/models/latest/model.pkl.
        #         Ten bucket lay tu secret CLOUD_BUCKET.
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3
          import os

          # Create S3 client
          s3 = boto3.client(
              "s3",
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"]
          )

          # Upload model
          s3.upload_file(
              "models/model.pkl",
              os.environ["CLOUD_BUCKET"],
              "models/latest/model.pkl"
          )
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        #         Neu accuracy < 0.70, ket thuc voi loi ro rang.
        #         Neu dat nguong, in thong bao va tiep tuc.
        #
        # Goi y:
        #   acc = float("${{ needs.train.outputs.accuracy }}")
        #   if acc < 0.70:
        #       raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
        #   print("PASSED: dang trien khai model.")
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.60:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.60. Huy deploy.")
          print("PASSED: dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy serve.py to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py"
          target: "/home/${{ secrets.VM_USER }}/src"
          strip_components: 1

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
          CLOUD_CREDENTIALS: ${{ secrets.CLOUD_CREDENTIALS }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: CLOUD_BUCKET,CLOUD_CREDENTIALS
          script: |
            # Create src folder if not exists
            mkdir -p ~/src

            # Install jq if missing
            sudo apt-get update && sudo apt-get install -y jq || true
            
            # Parse AWS credentials from JSON secret
            AWS_ACCESS_KEY_ID=$(echo $CLOUD_CREDENTIALS | jq -r '.aws_access_key_id')
            AWS_SECRET_ACCESS_KEY=$(echo $CLOUD_CREDENTIALS | jq -r '.aws_secret_access_key')
            
            # Install python dependencies if missing
            sudo apt-get install -y python3-pip python3-pandas || true
            sudo pip3 install "numpy<2" pandas boto3 fastapi uvicorn joblib scikit-learn --break-system-packages --upgrade || sudo pip3 install "numpy<2" pandas boto3 fastapi uvicorn joblib scikit-learn --upgrade || true
            
            # Write systemd service file with S3 and AWS environment variables
            sudo tee /etc/systemd/system/mlops-serve.service > /dev/null <<EOF
            [Unit]
            Description=MLOps Model Inference Server
            After=network.target

            [Service]
            User=$USER
            WorkingDirectory=/home/$USER
            Environment="S3_BUCKET=$CLOUD_BUCKET"
            Environment="AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
            Environment="AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
            Environment="AWS_DEFAULT_REGION=ap-southeast-1"
            ExecStart=/usr/bin/python3 /home/$USER/src/serve.py
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            # Reload daemon and restart service
            sudo systemctl daemon-reload
            sudo systemctl enable mlops-serve
            sudo systemctl restart mlops-serve
            
            echo "Waiting for service to start..."
            sleep 5
            
            # Verify status and logs if it fails
            if ! curl -sf http://localhost:8000/health; then
                echo "=== SERVICE STATUS ==="
                sudo systemctl status mlops-serve || true
                echo "=== SERVICE LOGS ==="
                sudo journalctl -u mlops-serve -n 50 || true
                exit 1
            fi
            echo "Health check passed."
